<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#49f4ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SIOUX BYPASSER V1.9.4 - Pelepasan Tanggung Jawab Hukum</title>

  <style>
    :root {
      --neon-cyan: #49f4ff;
      --neon-blue: #4a7dff;
      --neon-magenta: #ff59c7;
      --neon-gold: #ffb347;
      --neon-lime: #7dff7a;
      --neon-violet: #a96dff;
      --panel-bg: rgba(7, 12, 28, 0.82);
      --panel-border: rgba(112, 239, 255, 0.18);
      --text-main: #f8fbff;
      --text-muted: rgba(222, 236, 255, 0.74);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 14% 18%, rgba(73, 244, 255, 0.18) 0%, transparent 22%),
        radial-gradient(circle at 84% 16%, rgba(255, 89, 199, 0.16) 0%, transparent 20%),
        radial-gradient(circle at 50% 82%, rgba(255, 179, 71, 0.1) 0%, transparent 26%),
        linear-gradient(135deg, rgba(2, 8, 20, 0.96) 0%, rgba(5, 12, 30, 0.94) 48%, rgba(5, 8, 18, 0.98) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      margin: 0;
      overflow: visible;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(110, 246, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110, 246, 255, 0.028) 1px, transparent 1px);
      background-size: 54px 54px;
      opacity: 0.45;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 18%, transparent 82%, rgba(255, 255, 255, 0.02) 100%),
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.012) 0, rgba(255, 255, 255, 0.012) 2px, transparent 2px, transparent 6px);
      mix-blend-mode: screen;
      opacity: 0.32;
      pointer-events: none;
    }

    @keyframes versionSpectrumFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes badgeFloatGlow {
      0%,
      100% {
        transform: translateY(0);
        filter: saturate(100%);
      }
      50% {
        transform: translateY(-2px);
        filter: saturate(120%);
      }
    }

    .overlay {
      display: none; /* Hide overlay when in iframe */
    }

    .modal {
      position: relative;
      max-width: 600px;
      width: calc(100% - 40px);
      max-height: 90vh;
      max-height: 90dvh;
      background:
        linear-gradient(160deg, rgba(7, 12, 28, 0.94) 0%, rgba(6, 11, 24, 0.96) 52%, rgba(10, 12, 28, 0.92) 100%);
      backdrop-filter: blur(26px) saturate(165%);
      -webkit-backdrop-filter: blur(26px) saturate(165%);
      border: 1px solid var(--panel-border);
      border-radius: 26px;
      padding: 48px 40px;
      padding-top: 60px;
      z-index: 10;
      box-shadow: 
        0 18px 54px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 0 48px rgba(73, 244, 255, 0.08),
        0 0 74px rgba(255, 89, 199, 0.06);
      margin: 20px auto;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
      contain: layout style;
      -webkit-overflow-scrolling: touch;
    }

    .modal::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background:
        linear-gradient(135deg, rgba(73, 244, 255, 0.9), rgba(74, 125, 255, 0.72), rgba(255, 89, 199, 0.72), rgba(255, 179, 71, 0.78));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    .modal::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background:
        radial-gradient(circle at 0% 0%, rgba(73, 244, 255, 0.12) 0%, transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(255, 89, 199, 0.1) 0%, transparent 22%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, transparent 18%);
      pointer-events: none;
    }

    .badge {
      position: absolute;
      top: -14px;
      right: 20px;
      color: #fdfdff;
      padding: 12px 20px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.15px;
      background:
        linear-gradient(140deg, rgba(5, 10, 26, 0.98), rgba(9, 16, 36, 0.94)) padding-box,
        linear-gradient(115deg, #7dff7a 0%, #49f4ff 18%, #4a7dff 37%, #a96dff 56%, #ff59c7 76%, #ffb347 100%) border-box;
      background-size: 100% 100%, 220% 220%;
      animation: versionSpectrumFlow 8s linear infinite, badgeFloatGlow 3.8s ease-in-out infinite;
      box-shadow:
        0 10px 26px rgba(0, 0, 0, 0.34),
        0 0 18px rgba(125, 255, 122, 0.18),
        0 0 30px rgba(73, 244, 255, 0.18),
        0 0 42px rgba(169, 109, 255, 0.16),
        0 0 54px rgba(255, 89, 199, 0.16);
      border: 1px solid transparent;
      text-transform: uppercase;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      line-height: 1.2;
      overflow: hidden;
      isolation: isolate;
    }

    .badge::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, rgba(125, 255, 122, 0.22), rgba(73, 244, 255, 0.16), rgba(169, 109, 255, 0.18), rgba(255, 89, 199, 0.18), rgba(255, 179, 71, 0.2));
      opacity: 0.72;
      mix-blend-mode: screen;
      z-index: -2;
    }

    .badge::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 15px;
      background:
        radial-gradient(circle at 18% 22%, rgba(125, 255, 122, 0.24) 0%, transparent 34%),
        radial-gradient(circle at 82% 22%, rgba(73, 244, 255, 0.2) 0%, transparent 30%),
        radial-gradient(circle at 50% 110%, rgba(255, 89, 199, 0.18) 0%, transparent 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
      z-index: -1;
    }

    h1 {
      font-size: 31px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-cyan), #8ceeff 24%, var(--neon-blue) 62%, var(--neon-magenta) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
      text-shadow: 0 0 32px rgba(73, 244, 255, 0.12);
    }

    .content {
      color: var(--text-main);
      font-size: 15.5px;
      line-height: 1.95;
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }

    .content p {
      margin-bottom: 18px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .content strong {
      color: #ffffff;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(73, 244, 255, 0.16), rgba(74, 125, 255, 0.18), rgba(255, 89, 199, 0.16));
      padding: 2px 6px;
      border-radius: 6px;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #3de7ff 0%, #3288ff 46%, #7f5cff 100%);
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 14px 28px rgba(24, 89, 255, 0.34),
        0 0 34px rgba(61, 231, 255, 0.18),
        0 0 48px rgba(127, 92, 255, 0.14);
      letter-spacing: 0.35px;
      min-height: 48px; /* Better touch target */
      touch-action: manipulation;
      will-change: transform;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.26), transparent);
    }

    .btn:hover:not(:disabled) {
      box-shadow:
        0 18px 36px rgba(24, 89, 255, 0.4),
        0 0 42px rgba(61, 231, 255, 0.24),
        0 0 44px rgba(127, 92, 255, 0.22);
    }

    .btn:hover:not(:disabled)::before {
      left: 100%;
    }

    .btn:active:not(:disabled) {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .telegram-link-section {
      margin-top: 24px;
      text-align: center;
    }

    .telegram-link {
      width: 52px;
      height: 52px;
      margin: 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(73, 244, 255, 0.16), rgba(74, 125, 255, 0.14), rgba(255, 89, 199, 0.12));
      border: 1px solid rgba(73, 244, 255, 0.24);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 0 22px rgba(73, 244, 255, 0.1);
      transition: all 0.2s ease;
    }

    .telegram-link svg {
      width: 24px;
      height: 24px;
      fill: #8ef4ff;
      filter: drop-shadow(0 0 12px rgba(73, 244, 255, 0.18));
    }

    .telegram-link:hover {
      transform: translateY(-2px);
      border-color: rgba(73, 244, 255, 0.5);
      box-shadow:
        0 0 28px rgba(73, 244, 255, 0.18),
        0 0 36px rgba(74, 125, 255, 0.12);
    }

    .god-version-notice {
      margin-top: 20px;
      text-align: center;
    }

    .god-version-notice p {
      color: #ff8fd9;
      font-size: 14px;
      font-weight: 700;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.85px;
      text-shadow:
        0 0 18px rgba(255, 89, 199, 0.22),
        0 0 26px rgba(74, 125, 255, 0.12);
    }

    footer {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(208, 227, 255, 0.48);
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Responsive Design - Mobile/Phone */
    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .modal {
        padding: 32px 24px;
        padding-top: 50px;
        border-radius: 20px;
        max-width: calc(100% - 32px);
        max-height: calc(100vh - 32px);
        max-height: calc(100dvh - 32px);
        width: 100%;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        overflow-x: hidden;
      }
      
      /* Disable hover effects on touch devices */
      @media (hover: none) {
        .btn:hover {
          box-shadow: 0 14px 28px rgba(24, 89, 255, 0.3), 0 0 36px rgba(73, 244, 255, 0.18) !important;
        }
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .content {
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 24px;
      }

      .content p {
        margin-bottom: 14px;
      }

      .btn {
        padding: 14px 20px;
        font-size: 15px;
        border-radius: 12px;
      }

      .badge {
        top: -10px;
        right: 16px;
        padding: 8px 14px;
        font-size: 10px;
        white-space: nowrap;
      }

      .telegram-link {
        width: 48px;
        height: 48px;
        border-radius: 14px;
      }

      .god-version-notice p {
        font-size: 12px;
      }

      footer {
        margin-top: 20px;
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .modal {
        padding: 28px 20px;
        padding-top: 48px;
        border-radius: 18px;
        max-width: calc(100% - 24px);
        max-height: calc(100vh - 24px);
        overflow-x: hidden;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 18px;
      }

      .content {
        font-size: 13.5px;
        line-height: 1.65;
        margin-bottom: 20px;
      }

      .content p {
        margin-bottom: 12px;
      }

      .content strong {
        padding: 2px 4px;
        font-size: 13px;
      }

      .btn {
        padding: 13px 18px;
        font-size: 14px;
        border-radius: 10px;
      }

      .badge {
        top: -8px;
        right: 12px;
        padding: 7px 12px;
        font-size: 9px;
        white-space: nowrap;
      }

      .telegram-link {
        width: 46px;
        height: 46px;
      }

      .god-version-notice p {
        font-size: 11px;
      }

      footer {
        margin-top: 16px;
        font-size: 10px;
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 10px;
      }

      .modal {
        padding: 24px 16px;
        border-radius: 16px;
        max-width: calc(100% - 20px);
      }

      h1 {
        font-size: 20px;
        margin-bottom: 16px;
      }

      .content {
        font-size: 13px;
        margin-bottom: 18px;
      }

      .btn {
        padding: 12px 16px;
        font-size: 13px;
      }
    }

    /* Landscape phone orientation */
    @media (max-width: 896px) and (max-height: 500px) and (orientation: landscape) {
      .modal {
        padding: 24px 28px;
        max-height: calc(100vh - 20px);
      }

      h1 {
        font-size: 22px;
        margin-bottom: 16px;
      }

      .content {
        font-size: 13px;
        margin-bottom: 16px;
      }

      .content p {
        margin-bottom: 10px;
      }

      .btn {
        padding: 12px 20px;
        font-size: 14px;
      }
    }

    @media (max-height: 700px) {
      .modal {
        padding: 32px 28px;
        max-height: calc(100vh - 20px);
      }

      h1 {
        font-size: 26px;
        margin-bottom: 20px;
      }

      .content {
        margin-bottom: 24px;
      }

      .content p {
        margin-bottom: 12px;
      }
    }
  </style>
